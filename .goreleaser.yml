version: 2

project_name: tmh

before:
  hooks:
    - go mod tidy
    # Regenerate man pages, completions, and JSON schema so release
    # tarballs always ship in-sync with the cobra tree + config types.
    - go run ./cmd/tmh-gen

builds:
  - id: tmh
    main: ./cmd/tmh
    binary: tmh
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.Commit}}
      - -X main.Date={{.Date}}

archives:
  - id: tmh
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: ["tar.gz"]
    files:
      - README.md
      - README.ru.md
      - CHANGELOG.md
      - LICENSE
      - SECURITY.md
      - examples/*
      - docs/man/*.1
      - docs/completions/**/*
      - schemas/tmh.schema.json

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

signs:
  - id: gpg
    artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"

release:
  draft: true
  prerelease: auto
